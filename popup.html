<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Inspector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="palette">
    <!-- Header -->
    <header class="palette-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 12h8M8 8h5M8 16h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Page Inspector</span>
      </div>
      <div class="header-actions">
        <button class="minimize-btn" id="minimizeBtn" title="最小化">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 8h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="close-btn" id="closeBtn" title="关闭">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings Section -->
    <section class="settings" id="settingsSection">
      <div class="setting-row">
        <label>API URL</label>
        <input type="text" id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions">
      </div>
      <div class="setting-row">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>
      <div class="setting-row">
        <label>Model</label>
        <input type="text" id="model" placeholder="gpt-4o-mini">
      </div>
      <button class="save-btn" id="saveSettings">保存配置</button>
    </section>

    <!-- Toggle Settings -->
    <button class="toggle-settings" id="toggleSettings">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7 4v3l2 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span>设置</span>
    </button>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot"></span>
      <span class="status-text">就绪</span>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="action-btn primary" id="summarizeAndSaveBtn">
        <div class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M12 2H5a1 1 0 00-1 1v14a1 1 0 001 1h10a1 1 0 001-1V6l-4-4z" stroke="currentColor" stroke-width="1.3"/>
            <path d="M12 2v4h4M8 10h4M8 13h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="btn-content">
          <span class="btn-title">提取并总结</span>
          <span class="btn-desc">提取网页 → AI 总结 → 保存 Markdown</span>
        </div>
        <div class="btn-arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>

      <button class="action-btn secondary" id="extractContentBtn">
        <div class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7 7h6M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="btn-content">
          <span class="btn-title">提取正文</span>
          <span class="btn-desc">仅提取网页纯文本（不总结）</span>
        </div>
        <div class="btn-arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>
    </div>

    <!-- Result Area -->
    <div class="result-area" id="resultArea">
      <div class="result-header">
        <span>结果</span>
        <button class="copy-btn" id="copyResult">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="4" y="4" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/>
            <path d="M2 10V3a1 1 0 011-1h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          复制
        </button>
      </div>
      <div class="result-content" id="resultContent">
        <span class="placeholder">点击上方按钮开始处理...</span>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <span>处理中...</span>
    </div>
  </div>

  <!-- Floating Bubble (shown when minimized) -->
  <div class="floating-bubble" id="floatingBubble">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
      <path d="M8 12h8M8 8h5M8 16h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>

  <script src="popup.js"></script>
</body>
</html>
