<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Inspector UI Preview</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .preview-hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 176, 0, 0.15);
      border: 1px solid rgba(255, 176, 0, 0.3);
      color: #ffb000;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font-display);
    }
  </style>
</head>
<body>
  <div class="preview-hint">UI 预览 — 实际效果请在 Chrome 扩展中查看</div>
  <div class="palette">
    <!-- Header -->
    <header class="palette-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 12h8M8 8h5M8 16h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Page Inspector</span>
      </div>
      <div class="header-actions">
        <button class="minimize-btn" id="minimizeBtn" title="最小化">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 8h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="close-btn" id="closeBtn" title="关闭">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings Section (open for preview) -->
    <section class="settings open" id="settingsSection">
      <div class="setting-row">
        <label>API URL</label>
        <input type="text" id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions" value="https://api.openai.com/v1/chat/completions">
      </div>
      <div class="setting-row">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-..." value="sk-xxxxxxxxxxxxxxxxxxxxxxxx">
      </div>
      <div class="setting-row">
        <label>Model</label>
        <input type="text" id="model" placeholder="gpt-4o-mini" value="gpt-4o-mini">
      </div>
      <button class="save-btn" id="saveSettings">保存配置</button>
    </section>

    <!-- Toggle Settings -->
    <button class="toggle-settings" id="toggleSettings">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7 4v3l2 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span>设置</span>
    </button>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot"></span>
      <span class="status-text">就绪</span>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="action-btn primary" id="summarizeBtn">
        <div class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2L3 7v11h14V7l-7-5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M7 17v-6h6v6M7 11h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="btn-content">
          <span class="btn-title">总结网页</span>
          <span class="btn-desc">提取核心内容并生成摘要</span>
        </div>
        <div class="btn-arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>

      <button class="action-btn secondary" id="saveMarkdownBtn">
        <div class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M12 2H5a1 1 0 00-1 1v14a1 1 0 001 1h10a1 1 0 001-1V6l-4-4z" stroke="currentColor" stroke-width="1.3"/>
            <path d="M12 2v4h4M8 10h4M8 13h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="btn-content">
          <span class="btn-title">保存 Markdown</span>
          <span class="btn-desc">下载网页内容为 .md 文件</span>
        </div>
        <div class="btn-arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>

      <button class="action-btn secondary" id="extractContentBtn">
        <div class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7 7h6M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="btn-content">
          <span class="btn-title">提取正文</span>
          <span class="btn-desc">获取网页纯文本内容</span>
        </div>
        <div class="btn-arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>
    </div>

    <!-- Result Area -->
    <div class="result-area" id="resultArea">
      <div class="result-header">
        <span>结果</span>
        <button class="copy-btn" id="copyResult">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="4" y="4" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/>
            <path d="M2 10V3a1 1 0 011-1h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          复制
        </button>
      </div>
      <div class="result-content" id="resultContent">
        <span class="placeholder">点击上方按钮开始处理...</span>
      </div>
    </div>

    <!-- Loading Overlay (disabled for preview) -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <span>处理中...</span>
    </div>

    <!-- Floating Bubble (shown when minimized) -->
    <div class="floating-bubble" id="floatingBubble">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 12h8M8 8h5M8 16h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Preview Script for minimize/restore -->
    <script>
      const palette = document.querySelector('.palette');
      const minimizeBtn = document.getElementById('minimizeBtn');
      const floatingBubble = document.getElementById('floatingBubble');

      minimizeBtn.addEventListener('click', () => {
        palette.style.display = 'none';
        floatingBubble.classList.add('visible');
      });

      floatingBubble.addEventListener('click', () => {
        palette.style.display = 'block';
        floatingBubble.classList.remove('visible');
      });
    </script>
  </div>
</body>
</html>
